<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Escalação de Times</h1>
    <hr>
    <h2>Escalar Jogadores</h2>
    <label for="posicao">Posição:</label>
    <input type="text" name="posicao" id="posicao">
    <label for="nome">Nome:</label>
    <input type="text" name="nome" id="nome">
    <label for="numero">Número:</label>
    <input type="text" name="numero" id="numero">
    <br>
    <button id="btnEscalar" onclick="escalar()">Escalar</button>
    <br>
    <h2>Remover Jogadores</h2>
    <label for="numeroRemover">Número:</label>
    <input type="text" name="numeroRemover" id="numeroRemover"> 
    <button id="btnRemover" onclick="remover()">Remover</button>
    <br> <br>
    <h2>Time</h2>
    <ul id="time"></ul>


    <script src="index.js"></script>
</body>
</html>
